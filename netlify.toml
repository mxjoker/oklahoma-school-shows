[build]
  command   = "npm run build"
  publish   = "out"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# ── Redirect: funkymonkeymagic.com → oklahomeschoolshows.com ──
# Set this up in Netlify dashboard under Domain Management > Redirects
# OR add funkymonkeymagic.com as a domain alias that 301-redirects

# ── Cache headers for static assets ──
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Redirects ──
[[redirects]]
  from   = "/assemblies"
  to     = "/shows"
  status = 301

[[redirects]]
  from   = "/magic-show"
  to     = "/shows"
  status = 301

[[redirects]]
  from   = "/book"
  to     = "/book-now"
  status = 301

# Catch-all for client-side routing (if switching to SSR later)
# [[redirects]]
#   from   = "/*"
#   to     = "/index.html"
#   status = 200
